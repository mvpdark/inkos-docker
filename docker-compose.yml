services:
  inkos:
    image: ghcr.io/mvpdark/inkos:latest
    # build: .
    container_name: inkos
    restart: unless-stopped
    ports:
      - "4567:4567"
    volumes:
      - inkos-workspace:/workspace
    environment:
      STUDIO_PORT: "4567"
      # ── LLM 配置（按需取消注释）──
      # INKOS_LLM_PROVIDER: custom
      # INKOS_LLM_BASE_URL: https://api.moonshot.cn/v1
      # INKOS_LLM_API_KEY: sk-your-key-here
      # INKOS_LLM_MODEL: kimi-k2.5
      # INKOS_LLM_SERVICE: moonshot
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4567/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  inkos-workspace:
    driver: local
