name: Bug Report
description: Report a bug in InkOS
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: InkOS Version
      description: Run `inkos --version` to get this
      placeholder: "0.3.6"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (inkos command)
        - Writer Agent
        - Auditor / Continuity Check
        - Reviser Agent
        - Scheduler / Daemon
        - Detection (AIGC)
        - State Management
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. inkos init
        2. inkos book create --title "test" --genre xuanhuan --platform tomato
        3. inkos write next test
        4. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: Paste relevant error output
      render: shell

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11"
